name: Architon scan (KiCad BOM)

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Architon CLI
        run: |
          set -euo pipefail
          go install github.com/badimirzai/architon-cli/cmd/rv@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          which rv
          rv version
          
      - name: Run rv scan
        run: |
          set -euo pipefail
          mkdir -p .architon
          RV_DEBUG=1 rv scan demos/demo1-esp32-motor/bom/bom.csv --out .architon/architon-report.json
          
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: architon-report
          path: .architon/architon-report.json